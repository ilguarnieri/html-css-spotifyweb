<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="css/app.css">
        <link rel="stylesheet" href="css/meta.css">
        <link rel="icon" href="img/favicon.ico">
        <title>Spotify</title>
    </head>

    <body>

        <header class="flex">

            <!-- VIEW SONG -->
            <div class="view-wrapper flex">
                <!-- IMG -->
                <img src="img/theblaze.jfif" alt="song_play">
                 <!-- NAME BAR -->
                <div class="view-name">
                    <!-- NAME TRACK -->
                    <div class="name-song">
                        Territory
                    </div>
                    <!-- Artist -->
                    <div class="name-author">
                        The Blaze
                    </div>                    
                </div>
                <!-- LIKE -->
                <div class="view-like">
                    <i class="fas fa-heart"></i>
                </div>
                <!-- ADD PLAYLIST -->
                <div class="view-playlist">
                    <i class="far fa-folder"></i>
                </div>
            </div>

            <!-- PLAY BAR -->
            <div class="play-wrapper flex-col">
                <!-- PLAY BUTTON -->
                <div class="play-bar flex">
                    <i class="fas fa-random"></i>
                    <i class="fas fa-step-backward"></i>
                    <i class="far fa-play-circle"></i>
                    <i class="fas fa-step-forward"></i>
                    <i class="fas fa-redo-alt"></i>
                </div>

                <!-- STEP TRACK -->
                <div class="step-track flex">
                    <!-- START -->
                    <div class="track-start">
                        0:00
                    </div>

                    <!-- PROGRESS BAR -->
                    <div class="track-bar">
                        <div class="progress-bar song_bar">
                        </div>
                    </div>

                    <!-- END -->
                    <div class="track-end">
                        4:36
                    </div>
                </div>
            </div>

            <!-- VOLUME -->
            <div class="volume-wrapper flex">
                <!-- ICON -->
                <i class="fas fa-list"></i>
                <i class="fas fa-desktop"></i>
                <i class="fas fa-volume-up"></i>

                <!-- VOLUME BAR -->
                <div class="track-bar">
                    <div class="progress-bar livel_vol">
                    </div>
                </div>         
            </div> 
        </header>

        <main class="flex">

            <!-- SIDEBAR -->
            <aside class="sidebar">

                <!-- LOGO -->
                <div class="logo">
                    <img src="img/logo.svg" class="logo-big" alt="logo">
                    <img src="img/logo-small.svg" class="logo-small" alt="logo">
                </div>

                <ul class="main-bar" >
                    <!-- HOME -->
                    <li class="flex active">
                        <img src="img/home.svg" alt="home">
                        <p>Home</p>
                    </li>
                    <!-- SEARCH -->
                    <li class="flex">
                        <img src="img/search.svg" alt="search">
                        <p>Cerca</p>
                    </li>
                    <!-- LIBRARY -->
                    <li class="flex">
                        <img src="img/libreria.svg" alt="library">
                        <p>La tua libreria</p>
                    </li>
                </ul>



                <!-- PLAYLIST -->
                <div class="playlist">
                    <h3>Playlist</h3>                    
                    <ul>
                        <li class="create-play flex">
                            <i class="fas fa-plus-square"></i>
                            <p>Crea Playlist</p>
                        </li>
                        <li>
                            <p>Nuova playlist</p>
                        </li>
                        <li>
                            <p>Nuova playlist</p>
                        </li>
                        <li>
                            <p>Nuova playlist</p>
                        </li>
                        <li>
                            <p>Nuova playlist</p>
                        </li>
                        <li>
                            <p>Nuova playlist</p>
                        </li>
                        <li>
                            <p>Nuova playlist</p>
                        </li>
                        <li>
                            <p>Nuova playlist</p>
                        </li>
                        
                    </ul>

                </div>


                <!-- USER -->
                <div class="user-side">
                    <!-- DOWNLOAD -->
                    <div class="download-app flex">
                        <img src="img/download.svg" alt="download">
                        <p>Installa app</p>
                    </div>

                    <!-- USER -->
                    <div class="user-info line flex">
                        <img src="img/user.jpeg" alt="user">
                        <p>Angelo Guarnieri</p>
                    </div>
                    
                </div>





            </aside>





            <section>
              




            </section>           




        </main>
    </body>
</html>
